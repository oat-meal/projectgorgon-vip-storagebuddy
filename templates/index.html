                                </div>
                                <div style="display: flex; align-items: center; margin-bottom: 8px;">
                                    <div style="min-width: 70px; padding: 5px 8px; background: #f3e5f5; border-left: 3px solid #9c27b0; border-radius: 3px; margin-right: 10px; font-weight: 600; color: #9c27b0; font-size: 11px;">Purple</div>
                                    <div style="color: var(--text-secondary);">Vendor sells item but requires more favor</div>
                                </div>
                                <div style="display: flex; align-items: center; margin-bottom: 8px;">
                                    <div style="min-width: 70px; padding: 5px 8px; background: #e8eaf6; border-left: 3px solid var(--accent); border-radius: 3px; margin-right: 10px; font-weight: 600; color: var(--accent); font-size: 11px;">Blue</div>
                                    <div style="color: var(--text-secondary);">Need to gather materials</div>
                                </div>
                                <div style="display: flex; align-items: center;">
                                    <div style="min-width: 70px; padding: 5px 8px; background: var(--bg-item); border-left: 3px solid var(--border-color); border-radius: 3px; margin-right: 10px; font-weight: 600; color: var(--text-muted); font-size: 11px; opacity: 0.7;">Gray 🔒</div>
                                    <div style="color: var(--text-secondary);">Skill level too low</div>
                                </div>
                            </div>
                        </div>

                        <div style="background: var(--bg-item); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px;">
                            <h4 style="color: var(--accent); margin-bottom: 10px; font-size: 14px;">Material Source Icons</h4>
                            <div style="font-size: 12px; line-height: 1.8; color: var(--text-secondary);">
                                <div style="margin-bottom: 4px;">✓ <strong>Have</strong> — In inventory/storage</div>
                                <div style="margin-bottom: 4px;">🔨 <strong>Craft</strong> — Can craft</div>
                                <div style="margin-bottom: 4px;">🛒 <strong>Buy</strong> — From NPC vendor</div>
                                <div style="margin-bottom: 4px;">❤️ <strong>Need Favor</strong> — Vendor sells but requires relationship</div>
                                <div>🔍 <strong>Gather</strong> — Farm in-game</div>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            const materialMap = {};
            let totalCrafts = 0;

            for (const recipeId of selectedRecipeIds) {
                const recipe = allRecipes.find(r => r.id === recipeId);
                if (!recipe) continue;

                const qty = recipeQuantities[recipeId] || 1;
                totalCrafts += qty;

                for (const ingredient of recipe.ingredients) {
                    const name = ingredient.item || ingredient.name;
                    if (!materialMap[name]) {
                        materialMap[name] = { quantity: 0 };
                    }
                    materialMap[name].quantity += ingredient.quantity * qty;
                }
            }

            // Use the already-loaded player inventory details
            // playerInventoryDetails is populated by loadPlayerInventory() using /api/inventory

            const materials = Object.entries(materialMap)
                .map(([name, data]) => ({ name, quantity: data.quantity }))
                .sort((a, b) => a.name.localeCompare(b.name));

            // Build header with selected recipes info and quantity controls
            let recipesInfo = '';
            for (const recipeId of selectedRecipeIds) {
                const recipe = allRecipes.find(r => r.id === recipeId);
                const qty = recipeQuantities[recipeId] || 1;
                if (recipe) {
                    // Escape recipeId for use in onclick handlers
                    const escapedId = recipeId.replace(/'/g, "\\'");

                    // Check skill requirement
                    const recipeSkill = recipe.skill || '';
                    const recipeLevel = recipe.level || 0;
                    const playerLevel = playerSkills[recipeSkill] || 0;
                    const hasSkill = playerLevel >= recipeLevel;

                    // Determine background color based on skill
                    let bgColor = '#f5f5f5'; // Default
                    let skillBadge = '';
                    if (!hasSkill) {
                        bgColor = '#ffebee'; // Light red for missing skill
                        skillBadge = `<span style="color: #d32f2f; font-weight: 500;" title="Need ${recipeSkill} ${recipeLevel}, you have ${playerLevel}">🔒 Need Lv${recipeLevel} (You: ${playerLevel})</span>`;
                    } else {
                        skillBadge = `<span style="color: var(--success);">✓ Lv${recipeLevel}</span>`;
                    }

                    recipesInfo += `<div style="margin-bottom: 8px; padding: 8px; background: ${bgColor}; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight: 500; color: var(--text-primary);">${recipe.name}</div>
                            <div style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">${recipe.skill} • ${skillBadge}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <button onclick="updateRecipeQuantity('${escapedId}', -1)" style="width: 28px; height: 28px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 16px;">−</button>
                            <input type="number" value="${qty}" min="1" max="999"
                                onchange="setRecipeQuantity('${escapedId}', this.value)"
                                style="width: 48px; height: 28px; text-align: center; font-weight: 500; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
                            <button onclick="updateRecipeQuantity('${escapedId}', 1)" style="width: 28px; height: 28px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 16px;">+</button>
                            <button onclick="toggleRecipeSelection('${escapedId}')" style="width: 28px; height: 28px; border: 1px solid #f44336; border-radius: 4px; background: #fff; color: #f44336; cursor: pointer; font-size: 14px;" title="Remove">✕</button>
                        </div>
                    </div>`;
                }
            }

            let html = `
                <div class="quest-detail-header">
                    <div class="quest-detail-name">Crafting Checklist</div>
                    <div class="quest-detail-description">${selectedRecipeIds.length} recipe${selectedRecipeIds.length !== 1 ? 's' : ''}, ${totalCrafts} craft${totalCrafts !== 1 ? 's' : ''}</div>
                </div>
                ${recipesInfo}
                <div class="checklist-items">
            `;

            for (const material of materials) {
                // Use getIngredientCount for keyword matching (e.g., "Any Bone" -> "Femur")
                const ingredientInfo = getIngredientCount(material.name);
                const totalOwned = ingredientInfo.count;
                const needed = material.quantity;
                const missing = Math.max(0, needed - totalOwned);

                // Get detailed inventory info for matched items
                let inInventory = 0;
                let storageLocations = {};

                if (ingredientInfo.matchType === 'exact') {
                    const invDetails = playerInventoryDetails[material.name];
                    inInventory = invDetails ? invDetails.inventory : 0;
                    storageLocations = invDetails ? invDetails.storage : {};
                } else if (ingredientInfo.matchType === 'keyword') {
                    // Sum up from all matched items
                    for (const matchedItem of ingredientInfo.matchedItems) {
                        const invDetails = playerInventoryDetails[matchedItem];
                        if (invDetails) {
                            inInventory += invDetails.inventory || 0;
                            for (const [loc, count] of Object.entries(invDetails.storage || {})) {
                                storageLocations[loc] = (storageLocations[loc] || 0) + count;
                            }
                        }
                    }
                }

                // Build location info similar to quest page format
                let locationInfo = '';
                if (totalOwned > 0) {
                    locationInfo = `<div style="font-size: 13px; color: var(--accent); margin-top: 4px;">`;
                    if (inInventory > 0) {
                        locationInfo += `📦 Inventory: ${inInventory}`;
                    }

                    // Show individual storage locations
                    if (storageLocations && Object.keys(storageLocations).length > 0) {
                        for (const [location, count] of Object.entries(storageLocations)) {
                            // Get appropriate icon for each location type
                            let icon = '🏦'; // Default bank icon
                            if (location.toLowerCase().includes('dream')) {
                                icon = '💤'; // Dream world chest
                            } else if (location.toLowerCase().includes('saddlebag')) {
                                icon = '🎒'; // Saddlebag
                            }
                            if (inInventory > 0 || locationInfo.includes('|')) locationInfo += ' | ';
                            locationInfo += `${icon} ${location}: ${count}`;
                        }
                    }

                    locationInfo += `</div>`;
                }

                // Determine retrieval method using enhanced categorization
                const category = categorizeMaterial(material.name, needed, totalOwned);
                let retrievalMethod = '';
                let methodColor = '#999';

                if (category.source === 'storage') {
                    // Show where to retrieve items from
                    let retrieveFrom = [];
                    if (inInventory > 0) {
                        retrieveFrom.push(`Inventory (${inInventory})`);
                    }
                    if (storageLocations && Object.keys(storageLocations).length > 0) {
                        for (const [location, count] of Object.entries(storageLocations)) {
                            retrieveFrom.push(`${location} (${count})`);
                        }
                    }
                    if (retrieveFrom.length > 0) {
                        retrievalMethod = `✓ Ready - retrieve from: ${retrieveFrom.join(', ')}`;
                    } else {
                        retrievalMethod = '✓ Have materials';
                    }
                    methodColor = '#4caf50';
                } else if (category.source === 'craft') {
                    // Item can be crafted with available materials
                    const craftInfo = category.info;
                    retrievalMethod = `🔨 Craft: ${craftInfo.recipeName} (${craftInfo.skill})`;
                    if (craftInfo.craftsNeeded > 1) {
                        retrievalMethod += ` x${craftInfo.craftsNeeded}`;
                    }
                    methodColor = '#4caf50'; // Green - ready to make
                } else if (category.source === 'buy') {
                    // Item can be bought from vendor - show vendor info with price
                    const vendors = category.info;
                    const firstVendor = vendors[0];
                    const price = firstVendor.price || 0;
                    const totalCost = price * missing;
                    retrievalMethod = `🛒 Buy from ${firstVendor.vendor} (${firstVendor.location})`;
                    if (price > 0) {
                        retrievalMethod += ` - ${missing}x ${price} = ${totalCost} councils`;
                    }
                    methodColor = '#ff9800'; // Orange
                } else if (category.source === 'buy_needs_favor') {
                    // Item can be bought but requires more favor
                    const vendors = category.info;
                    const firstVendor = vendors[0];
                    const requiredFavor = firstVendor.favor || 'Unknown';
                    retrievalMethod = `❤️ Need ${requiredFavor} favor with ${firstVendor.vendor} (${firstVendor.location})`;
                    methodColor = '#9c27b0'; // Purple
                } else {
                    // Must be gathered - add wiki link
                    const wikiUrl = `https://wiki.projectgorgon.com/wiki/Special:Search?search=${encodeURIComponent(material.name)}`;
                    retrievalMethod = `🔍 Farm/Gather <a href="${wikiUrl}" target="_blank" style="color: var(--accent); text-decoration: underline; margin-left: 6px;" title="Search wiki for ${material.name}">📖 Wiki</a>`;
                    methodColor = '#667eea'; // Blue for gather
                }

                // Show matched items for keyword-based ingredients
                let matchedItemsInfo = '';
                if (ingredientInfo.matchType === 'keyword' && ingredientInfo.matchedItems.length > 0) {
                    const itemsList = ingredientInfo.matchedItems.slice(0, 3).join(', ');
                    const moreCount = ingredientInfo.matchedItems.length - 3;
                    matchedItemsInfo = `<div style="font-size: 12px; color: #9c27b0; margin-top: 2px; font-style: italic;">
                        Matched: ${itemsList}${moreCount > 0 ? ` (+${moreCount} more)` : ''}
                    </div>`;
                }

                html += `
                    <div class="checklist-item">
                        <div class="item-info" style="flex: 1;">
                            <div class="item-name">${material.name}</div>
                            ${matchedItemsInfo}
                            <div class="item-progress">
                                Needed: ${needed}${missing > 0 ? ` | <span style="color: #f44336;">Missing: ${missing}</span>` : ''}
                            </div>
                            ${locationInfo}
                            <div class="item-progress" style="color: ${methodColor}; font-weight: 500; margin-top: 4px;">
                                ${retrievalMethod}
                            </div>
                        </div>
                    </div>
                `;
            }

            html += `
                </div>
            `;

            detailContainer.innerHTML = html;

            // Sync selections to server for browser extension
            await syncRecipeSelections();
        }

        // Sync recipe selections to server for browser extension access
        async function syncRecipeSelections() {
            try {
                // Build recipe data with names, skill, level for display in extension
                const recipes = {};
                for (const recipeId of Object.keys(recipeQuantities)) {
                    const recipe = allRecipes.find(r => r.id === recipeId);
                    if (recipe) {
                        recipes[recipeId] = {
                            quantity: recipeQuantities[recipeId] || 1,
                            name: recipe.name,
                            skill: recipe.skill,
                            level: recipe.level
                        };
                    }
                }

                await fetch('/api/shopping_list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipes })
                });
                debugLog('Recipe selections synced to server');
            } catch (error) {
                debugLog('Failed to sync recipe selections:', error);
            }
        }

        // Open overlay window
        let overlayWindow = null;

        function openOverlay() {
            const width = 360;
            const height = 550;
            const left = window.screenX + window.outerWidth - width - 50;
            const top = window.screenY + 50;

            overlayWindow = window.open(
                '/overlay',
                'StorageBuddy Overlay',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes,location=no,menubar=no,toolbar=no,status=no`
            );
        }

        // Close overlay when main window closes
        window.addEventListener('beforeunload', function() {
            if (overlayWindow && !overlayWindow.closed) {
                overlayWindow.close();
            }
        });

        // Load version on page load
        async function loadVersion() {
            try {
                const response = await fetch('/api/version');
                const data = await response.json();
                document.getElementById('appVersion').textContent = `v${data.data?.version || data.version}`;
                if (data.data?.log_file || data.log_file) {
                    document.getElementById('logFileInfo').textContent = `• Debug log: ${data.data?.log_file || data.log_file}`;
                }
            } catch (error) {
                console.error('Failed to load version:', error);
            }
        }

        // Check for updates from GitHub releases
        async function checkForUpdate() {
            try {
                const response = await fetch('/api/check_update');
                const data = await response.json();

                if (data.data?.update_available) {
                    const latestVersion = data.data.latest_version;
                    const releaseUrl = data.data.release_url;

                    // Create the update badge HTML
                    const badgeHtml = `<a href="${releaseUrl}" target="_blank" class="update-badge" title="Click to download v${latestVersion}">Update Available: v${latestVersion}</a>`;

                    // Add to header
                    document.getElementById('headerUpdateBadge').innerHTML = badgeHtml;

                    // Add to footer
                    document.getElementById('footerUpdateBadge').innerHTML = badgeHtml;

                    console.log(`[StorageBuddy] Update available: v${latestVersion}`);
                }
            } catch (error) {
                console.error('Failed to check for updates:', error);
            }
        }

        // Send heartbeat to server so it knows browser is still open
        async function sendHeartbeat() {
            try {
                await fetch('/api/heartbeat', { method: 'POST' });
            } catch (error) {
                // Server might be shutting down, that's ok
            }
        }

        // Update game data from CDN
        async function updateGameData() {
            const btn = document.getElementById('updateBtn');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const response = await fetch('/api/update_data', {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    btn.textContent = 'Updated!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.disabled = false;
                        // Reload current quest if one is selected
                        if (selectedQuest) {
                            loadQuestDetail(selectedQuest);
                        }
                    }, 2000);
                } else {
                    btn.textContent = 'Failed';
                    alert('Update failed:\n' + data.messages.join('\n'));
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.disabled = false;
                    }, 2000);
                }
            } catch (error) {
                btn.textContent = 'Error';
                alert('Update failed: ' + error.message);
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        function toggleDebugMode() {
            debugMode = !debugMode;
            const debugBtn = document.getElementById('debugBtn');
            const updateBtn = document.getElementById('updateBtn');

            if (debugMode) {
                debugBtn.textContent = 'Debug ON';
                debugBtn.style.background = '#f44336';
                updateBtn.style.display = 'inline-block';
                debugLog('Debug mode enabled');
                debugLog('App state:', {
                    currentTab,
                    currentQuestView,
                    currentRecipeView,
                    selectedQuest,
                    activeQuestsCount: activeQuests.length,
                    recipesCount: allRecipes.length,
                    inventoryItemCount: Object.keys(playerInventory).length,
                    vendorItemCount: Object.keys(vendorItems).length
                });
            } else {
                debugBtn.textContent = 'Enable Debug';
                debugBtn.style.background = '#888';
                updateBtn.style.display = 'none';
                console.log('[StorageBuddy] Debug mode disabled');
            }
        }

        function debugLog(...args) {
            if (debugMode) {
                console.log('[StorageBuddy]', ...args);
            }
        }

        // Initialize
        loadVersion();
        checkForUpdate();

        // Send heartbeat every 2 seconds for fast shutdown detection
        setInterval(sendHeartbeat, 2000);
        sendHeartbeat(); // Send immediately on load
    </script>
</body>
</html>
