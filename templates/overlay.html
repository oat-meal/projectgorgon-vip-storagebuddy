<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorageBuddy Overlay</title>
    <style>
        /* Theme Definitions - synced with main page */
        :root, [data-theme="sepia"] {
            --bg-gradient-1: #c4a574;
            --bg-gradient-2: #8b6914;
            --bg-page: #3d3528;
            --bg-card: #4a4035;
            --bg-card-hover: #5a5045;
            --bg-item: #5a5045;
            --bg-item-complete: #3d4a35;
            --border-color: #6b5d4a;
            --text-primary: #f5f0e6;
            --text-secondary: #d4c4ae;
            --text-muted: #a89878;
            --accent: #d4a84a;
            --success: #8daa6d;
            --warning: #d4924a;
            --danger: #c86a5a;
            --info: #7a9aaa;
        }

        [data-theme="ctp-latte"] {
            --bg-gradient-1: #7287fd;
            --bg-gradient-2: #8839ef;
            --bg-page: #dce0e8;
            --bg-card: #e6e9ef;
            --bg-card-hover: #ccd0da;
            --bg-item: #ccd0da;
            --bg-item-complete: #c5e0c5;
            --border-color: #bcc0cc;
            --text-primary: #4c4f69;
            --text-secondary: #5c5f77;
            --text-muted: #7c7f93;
            --accent: #1e66f5;
            --success: #40a02b;
            --warning: #fe640b;
            --danger: #d20f39;
            --info: #7287fd;
        }

        [data-theme="ctp-mocha"] {
            --bg-gradient-1: #89b4fa;
            --bg-gradient-2: #cba6f7;
            --bg-page: #1e1e2e;
            --bg-card: #313244;
            --bg-card-hover: #45475a;
            --bg-item: #45475a;
            --bg-item-complete: #2d4a2d;
            --border-color: #45475a;
            --text-primary: #cdd6f4;
            --text-secondary: #bac2de;
            --text-muted: #a6adc8;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --warning: #fab387;
            --danger: #f38ba8;
            --info: #89b4fa;
        }

        /* Solarized Light - Classic light theme with optimal contrast */
        [data-theme="solarized-light"] {
            --bg-gradient-1: #268bd2;
            --bg-gradient-2: #2aa198;
            --bg-page: #eee8d5;
            --bg-card: #fdf6e3;
            --bg-card-hover: #e4ddc8;
            --bg-item: #eee8d5;
            --bg-item-complete: #d5e8d4;
            --border-color: #d3cbb7;
            --text-primary: #073642;
            --text-secondary: #586e75;
            --text-muted: #93a1a1;
            --accent: #268bd2;
            --success: #859900;
            --warning: #cb4b16;
            --danger: #dc322f;
            --info: #2aa198;
        }

        /* Nord - Arctic-inspired dark theme */
        [data-theme="nord"] {
            --bg-gradient-1: #88c0d0;
            --bg-gradient-2: #5e81ac;
            --bg-page: #2e3440;
            --bg-card: #3b4252;
            --bg-card-hover: #434c5e;
            --bg-item: #434c5e;
            --bg-item-complete: #3d4a3d;
            --border-color: #4c566a;
            --text-primary: #eceff4;
            --text-secondary: #d8dee9;
            --text-muted: #a3be8c;
            --accent: #88c0d0;
            --success: #a3be8c;
            --warning: #ebcb8b;
            --danger: #bf616a;
            --info: #81a1c1;
        }

        /* Gruvbox - Retro earth-toned theme */
        [data-theme="gruvbox"] {
            --bg-gradient-1: #d79921;
            --bg-gradient-2: #98971a;
            --bg-page: #282828;
            --bg-card: #3c3836;
            --bg-card-hover: #504945;
            --bg-item: #504945;
            --bg-item-complete: #3d4220;
            --border-color: #665c54;
            --text-primary: #ebdbb2;
            --text-secondary: #d5c4a1;
            --text-muted: #a89984;
            --accent: #d79921;
            --success: #b8bb26;
            --warning: #fe8019;
            --danger: #fb4934;
            --info: #83a598;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            padding: 0;
            min-width: 320px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .container {
            background: var(--bg-page);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-icon {
            font-size: 20px;
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .header-version {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .connection-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .connection-status.connected {
            color: #76ff76;
        }

        .connection-status.disconnected {
            color: #ff6b6b;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #a8b2ff;
            border-bottom-color: var(--accent);
        }

        .controls {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .view-selector {
            flex: 1;
            background: rgb(45, 45, 55);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: rgb(255, 255, 255);
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .view-selector option {
            background: #2a2a3a;
            color: white;
        }

        .region-selector {
            background: rgb(45, 45, 55);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: rgb(255, 255, 255);
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            min-width: 100px;
        }

        .region-selector option {
            background: #2a2a3a;
            color: white;
        }

        .content {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            background: rgb(20, 20, 30);
            min-height: 0;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        /* Quest styles */
        .quest-group {
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid var(--accent);
        }

        .quest-group.ready {
            border-left-color: var(--success);
            background: rgba(76, 175, 80, 0.1);
        }

        .quest-group.buyable {
            border-left-color: var(--warning);
            background: rgba(255, 152, 0, 0.1);
        }

        .quest-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 12px;
        }

        .item.completed {
            background: rgba(76, 175, 80, 0.15);
        }

        .item-name {
            flex: 1;
            color: #b0b0b0;
            min-width: 120px;
        }

        .item.completed .item-name {
            color: #70d070;
        }

        .item-progress {
            font-weight: 600;
            color: #ffaa66;
            font-size: 11px;
        }

        .item.completed .item-progress {
            color: #70d070;
        }

        .item-details {
            width: 100%;
            font-size: 10px;
            color: var(--accent);
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vendor-info {
            color: var(--warning);
            font-size: 10px;
        }

        /* Recipe/Crafting styles */
        .recipe-group {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid var(--accent);
        }

        .recipe-group.ready {
            border-left-color: var(--success);
            background: rgba(76, 175, 80, 0.1);
        }

        .recipe-group.buyable {
            border-left-color: var(--warning);
            background: rgba(255, 152, 0, 0.1);
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .recipe-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .recipe-qty {
            font-size: 11px;
            color: var(--accent);
            background: rgba(102, 126, 234, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .recipe-skill {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Shopping cart styles */
        .shopping-item {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid var(--accent);
        }

        .shopping-item.buyable {
            border-left-color: var(--warning);
            background: rgba(255, 152, 0, 0.1);
        }

        .shopping-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .shopping-header .item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .shopping-header .item-progress {
            font-size: 11px;
            color: #ff6b6b;
            font-weight: 600;
        }

        .item-recipes {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            font-style: italic;
        }

        .shopping-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 10px;
            background: rgba(255, 152, 0, 0.2);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--warning);
        }

        .shopping-total {
            color: #ffcc00;
        }

        /* Empty/Error states */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .error-state {
            text-align: center;
            padding: 30px 20px;
            color: #ff6b6b;
            font-size: 12px;
            line-height: 1.5;
        }

        .status-bar {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .open-app-link {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .open-app-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-icon">📦</span>
            <span class="header-title">StorageBuddy</span>
            <span class="header-version">v{{ version }}</span>
            <span class="connection-status" id="connectionStatus">Connected</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="questsTab" data-tab="quests">Quests</button>
            <button class="tab-btn" id="craftingTab" data-tab="crafting">Crafting</button>
        </div>

        <div class="controls" id="questControls">
            <select class="view-selector" id="viewSelector">
                <option value="all">All</option>
                <option value="ready">Ready</option>
                <option value="pinned">Pinned</option>
            </select>
            <select class="region-selector" id="regionSelector">
                <option value="">All Regions</option>
            </select>
        </div>

        <div class="controls" id="craftingControls" style="display: none;">
            <select class="view-selector" id="craftingViewSelector">
                <option value="pinned">Pinned</option>
                <option value="ready">Ready</option>
            </select>
        </div>

        <div class="content" id="content">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>Loading...</p>
            </div>
        </div>

        <div class="status-bar">
            <span id="itemCount">0 items</span>
            <a href="/" target="_blank" class="open-app-link">Open Full App</a>
            <span id="lastUpdate">Just now</span>
        </div>
    </div>

    <script>
        // Theme Management - synced with main page
        function loadTheme() {
            const savedTheme = localStorage.getItem('storagebuddy-theme') || 'sepia';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        // Check for theme changes periodically (sync with main window)
        function checkThemeSync() {
            const savedTheme = localStorage.getItem('storagebuddy-theme') || 'sepia';
            if (document.documentElement.getAttribute('data-theme') !== savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        }

        // Load theme immediately
        loadTheme();

        // Check for theme sync every second
        setInterval(checkThemeSync, 1000);

        // Sync pinned quests from main window
        function syncPinnedQuests() {
            const savedPinned = JSON.parse(localStorage.getItem('pinnedQuests') || '[]');
            const newPinned = new Set(savedPinned);
            // Check if pinned quests changed
            if (newPinned.size !== pinnedQuests.size || [...newPinned].some(q => !pinnedQuests.has(q))) {
                pinnedQuests = newPinned;
                if (currentTab === 'quests' && currentView === 'pinned') {
                    renderFilteredQuests();
                }
            }
        }
        setInterval(syncPinnedQuests, 1000);

        let currentTab = 'quests';
        let currentView = 'all';
        let currentRegion = '';
        let craftingView = 'all';
        let lastUpdateTime = Date.now();
        let isConnected = true;
        let allQuests = [];
        let allRecipes = [];
        // Pinned quests - synced from main window
        let pinnedQuests = new Set(JSON.parse(localStorage.getItem('pinnedQuests') || '[]'));

        // Load saved preferences from localStorage
        const savedPrefs = JSON.parse(localStorage.getItem('overlayPrefs') || '{}');
        if (savedPrefs.tab) currentTab = savedPrefs.tab;
        if (savedPrefs.view) currentView = savedPrefs.view;
        if (savedPrefs.region) currentRegion = savedPrefs.region;
        if (savedPrefs.craftingView) craftingView = savedPrefs.craftingView;

        function savePrefs() {
            localStorage.setItem('overlayPrefs', JSON.stringify({
                tab: currentTab,
                view: currentView,
                region: currentRegion,
                craftingView: craftingView
            }));
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = e.target.dataset.tab;
                switchTab(tab);
                savePrefs();
            });
        });

        function switchTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            document.getElementById('questControls').style.display = tab === 'quests' ? 'flex' : 'none';
            document.getElementById('craftingControls').style.display = tab === 'crafting' ? 'flex' : 'none';

            loadData();
        }

        // View selector change
        document.getElementById('viewSelector').addEventListener('change', (e) => {
            currentView = e.target.value;
            savePrefs();
            loadData();
        });

        // Region selector change
        document.getElementById('regionSelector').addEventListener('change', (e) => {
            currentRegion = e.target.value;
            savePrefs();
            renderFilteredQuests();
        });

        // Crafting view selector change
        document.getElementById('craftingViewSelector').addEventListener('change', (e) => {
            craftingView = e.target.value;
            savePrefs();
            renderCraftingView();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateRegionSelector(quests) {
            const regionSelector = document.getElementById('regionSelector');
            const regions = [...new Set(quests.map(q => q.location).filter(Boolean))].sort();

            const currentSelection = regionSelector.value;

            regionSelector.innerHTML = '<option value="">All Regions</option>';
            regions.forEach(region => {
                const option = document.createElement('option');
                option.value = region;
                option.textContent = region;
                regionSelector.appendChild(option);
            });

            if (currentRegion && regions.includes(currentRegion)) {
                regionSelector.value = currentRegion;
            } else if (currentSelection && regions.includes(currentSelection)) {
                regionSelector.value = currentSelection;
            }
        }

        async function loadData() {
            const content = document.getElementById('content');
            const statusEl = document.getElementById('connectionStatus');

            try {
                if (currentTab === 'quests') {
                    await loadQuestData();
                } else {
                    await loadCraftingData();
                }

                isConnected = true;
                statusEl.textContent = 'Connected';
                statusEl.className = 'connection-status connected';

                lastUpdateTime = Date.now();
                updateTimestamp();
            } catch (error) {
                console.error('Error loading data:', error);
                isConnected = false;
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'connection-status disconnected';

                content.innerHTML = `
                    <div class="error-state">
                        <div style="font-size: 24px; margin-bottom: 10px;">⚠️</div>
                        Cannot connect to StorageBuddy
                    </div>
                `;
            }
        }

        async function loadQuestData() {
            // Always fetch active quests, filter client-side based on view
            const response = await fetch(`/api/overlay_data?view=active`);

            if (!response.ok) throw new Error('Server not responding');

            const data = await response.json();
            allQuests = data.quests;
            updateRegionSelector(allQuests);
            renderFilteredQuests();
        }

        function renderFilteredQuests() {
            const content = document.getElementById('content');
            let quests = allQuests;

            // Filter by view type
            if (currentView === 'pinned') {
                quests = quests.filter(q => pinnedQuests.has(q.internal_name));
            } else if (currentView === 'ready') {
                // Ready = completable (have all items) OR purchasable (can buy missing items)
                quests = quests.filter(q => {
                    const isCompletable = q.items.every(item => item.have >= item.need);
                    const isPurchasable = !isCompletable && q.items.every(item =>
                        item.have >= item.need || item.vendor_info
                    );
                    return isCompletable || isPurchasable;
                });
            }

            // Filter by region
            if (currentRegion) {
                quests = quests.filter(q => q.location === currentRegion);
            }

            if (quests.length === 0) {
                let emptyMessage;
                if (currentView === 'pinned') {
                    emptyMessage = 'No pinned quests. Pin quests from the main app.';
                } else if (currentView === 'ready') {
                    emptyMessage = 'No quests ready to complete';
                } else if (currentRegion) {
                    emptyMessage = `No quests in ${currentRegion}`;
                } else {
                    emptyMessage = 'No active quests with items';
                }
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>${emptyMessage}</p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 quests';
                return;
            }

            const questsHtml = quests.map(quest => {
                const isReady = quest.items.every(item => item.have >= item.need);
                const isBuyable = !isReady && quest.items.some(item => item.vendor_info);
                const questClass = isReady ? 'quest-group ready' : (isBuyable ? 'quest-group buyable' : 'quest-group');

                const itemsHtml = quest.items.map(item => {
                    const isCompleted = item.have >= item.need;
                    const itemClass = isCompleted ? 'item completed' : 'item';

                    let detailsHtml = '';
                    const total = (item.in_inventory || 0) + (item.in_storage || 0);
                    if (total > 0) {
                        let locationParts = [];
                        if (item.in_inventory) locationParts.push(`📦 Inventory: ${item.in_inventory}`);
                        if (item.storage_locations) {
                            for (const [location, count] of Object.entries(item.storage_locations)) {
                                let icon = '🏦';
                                let shortName = location;
                                if (location.toLowerCase().includes('saddlebag')) {
                                    icon = '🎒';
                                    shortName = 'Saddlebag';
                                }
                                locationParts.push(`${icon} ${shortName}: ${count}`);
                            }
                        }
                        if (locationParts.length > 0) {
                            detailsHtml += `<div class="item-details">${locationParts.join(' • ')}</div>`;
                        }
                    }
                    if (item.vendor_info && !isCompleted) {
                        detailsHtml += `<div class="vendor-info">🛒 ${escapeHtml(item.vendor_info)}</div>`;
                    }

                    return `
                        <div class="${itemClass}">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <span class="item-progress">${item.have}/${item.need}</span>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');

                return `
                    <div class="${questClass}">
                        <div class="quest-name">${escapeHtml(quest.name)}</div>
                        <div class="item-list">${itemsHtml}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = questsHtml;
            document.getElementById('itemCount').textContent = `${quests.length} quest${quests.length !== 1 ? 's' : ''}`;
        }

        async function loadCraftingData() {
            const response = await fetch('/api/shopping_list');

            if (!response.ok) throw new Error('Server not responding');

            const data = await response.json();
            allRecipes = data.recipes || [];
            renderCraftingView();
        }

        function renderCraftingView() {
            const content = document.getElementById('content');

            if (allRecipes.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔨</div>
                        <p>No recipes pinned</p>
                        <p style="font-size: 11px; margin-top: 8px; color: rgba(255,255,255,0.4);">
                            Pin recipes in the main app to see them here
                        </p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 recipes';
                return;
            }

            if (craftingView === 'pinned') {
                renderPinnedRecipes(content);
            } else if (craftingView === 'ready') {
                renderReadyRecipes(content);
            } else {
                renderPinnedRecipes(content);
            }
        }

        function renderPinnedRecipes(content) {
            let totalMaterials = 0;
            const recipesHtml = allRecipes.map(recipe => {
                const materialsHtml = recipe.materials.map(mat => {
                    const isCompleted = mat.have >= mat.need;
                    const itemClass = isCompleted ? 'item completed' : 'item';
                    totalMaterials++;

                    let detailsHtml = '';
                    const total = (mat.in_inventory || 0) + (mat.in_storage || 0);
                    if (total > 0) {
                        let locationParts = [];
                        if (mat.in_inventory) locationParts.push(`📦 Inventory: ${mat.in_inventory}`);
                        if (mat.storage_locations) {
                            for (const [location, count] of Object.entries(mat.storage_locations)) {
                                let icon = '🏦';
                                let shortName = location;
                                if (location.toLowerCase().includes('saddlebag')) {
                                    icon = '🎒';
                                    shortName = 'Saddlebag';
                                }
                                locationParts.push(`${icon} ${shortName}: ${count}`);
                            }
                        } else if (mat.in_storage) {
                            locationParts.push(`🏦 Storage: ${mat.in_storage}`);
                        }
                        if (locationParts.length > 0) {
                            detailsHtml += `<div class="item-details">${locationParts.join(' • ')}</div>`;
                        }
                    }
                    if (mat.vendor_info && !isCompleted) {
                        detailsHtml += `<div class="vendor-info">🛒 ${escapeHtml(mat.vendor_info)}</div>`;
                    }

                    return `
                        <div class="${itemClass}">
                            <span class="item-name">${escapeHtml(mat.name)}</span>
                            <span class="item-progress">${mat.have}/${mat.need}</span>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');

                const isReady = recipe.materials.every(mat => mat.have >= mat.need);
                const isBuyable = !isReady && recipe.materials.some(mat => mat.vendor_info);
                const recipeClass = isReady ? 'recipe-group ready' : (isBuyable ? 'recipe-group buyable' : 'recipe-group');

                return `
                    <div class="${recipeClass}">
                        <div class="recipe-header">
                            <span class="recipe-name">${escapeHtml(recipe.name)}</span>
                            <span class="recipe-qty">×${recipe.quantity}</span>
                        </div>
                        <div class="recipe-skill">${escapeHtml(recipe.skill)} • Level ${recipe.level}</div>
                        <div class="item-list" style="margin-top: 8px;">${materialsHtml}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = recipesHtml;
            document.getElementById('itemCount').textContent = `${allRecipes.length} recipe${allRecipes.length !== 1 ? 's' : ''}, ${totalMaterials} materials`;
        }

        function renderReadyRecipes(content) {
            const readyRecipes = allRecipes.filter(recipe =>
                recipe.materials.every(mat => mat.have >= mat.need)
            );

            if (readyRecipes.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>No recipes ready to craft</p>
                        <p style="font-size: 11px; margin-top: 8px; color: rgba(255,255,255,0.4);">
                            Gather more materials to craft these recipes
                        </p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 recipes ready';
                return;
            }

            const recipesHtml = readyRecipes.map(recipe => {
                const materialsHtml = recipe.materials.map(mat => {
                    return `
                        <div class="item completed">
                            <span class="item-name">${escapeHtml(mat.name)}</span>
                            <span class="item-progress">${mat.have}/${mat.need}</span>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="recipe-group ready">
                        <div class="recipe-header">
                            <span class="recipe-name">${escapeHtml(recipe.name)}</span>
                            <span class="recipe-qty">×${recipe.quantity}</span>
                        </div>
                        <div class="recipe-skill">${escapeHtml(recipe.skill)} • Level ${recipe.level}</div>
                        <div class="item-list" style="margin-top: 8px;">${materialsHtml}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = recipesHtml;
            document.getElementById('itemCount').textContent = `${readyRecipes.length} recipe${readyRecipes.length !== 1 ? 's' : ''} ready`;
        }

        function renderShoppingCart(content) {
            const shoppingItems = {};

            for (const recipe of allRecipes) {
                for (const mat of recipe.materials) {
                    const missing = mat.need - mat.have;
                    if (missing <= 0 || !mat.vendors || mat.vendors.length === 0) continue;

                    if (!shoppingItems[mat.name]) {
                        shoppingItems[mat.name] = {
                            name: mat.name,
                            totalNeed: 0,
                            totalHave: 0,
                            vendors: mat.vendors,
                            recipes: []
                        };
                    }

                    shoppingItems[mat.name].totalNeed += mat.need;
                    shoppingItems[mat.name].totalHave += mat.have;
                    shoppingItems[mat.name].recipes.push(`${recipe.name} (×${recipe.quantity})`);
                }
            }

            const items = Object.values(shoppingItems);

            if (items.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <p>Shopping cart is empty</p>
                        <p style="font-size: 11px; margin-top: 8px; color: rgba(255,255,255,0.4);">
                            No vendor-purchasable materials needed
                        </p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 items to buy';
                return;
            }

            items.sort((a, b) => {
                const aLoc = a.vendors[0]?.location || '';
                const bLoc = b.vendors[0]?.location || '';
                if (aLoc !== bLoc) return aLoc.localeCompare(bLoc);
                return a.name.localeCompare(b.name);
            });

            let totalCost = 0;
            items.forEach(item => {
                const missing = item.totalNeed - item.totalHave;
                const price = item.vendors[0]?.price || 0;
                totalCost += missing * price;
            });

            const itemsHtml = items.map(item => {
                const missing = item.totalNeed - item.totalHave;
                const vendor = item.vendors[0];
                const itemCost = missing * (vendor?.price || 0);

                return `
                    <div class="shopping-item buyable">
                        <div class="shopping-header">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <span class="item-progress">Buy ${missing}</span>
                        </div>
                        <div class="vendor-info">
                            🛒 ${escapeHtml(vendor.vendor)} (${escapeHtml(vendor.location)})<br>
                            💰 ${vendor.price}g each = ${itemCost}g total<br>
                            ⭐ Requires: ${escapeHtml(vendor.favor)} favor
                        </div>
                        <div class="item-recipes">For: ${item.recipes.join(', ')}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `
                <div class="shopping-summary">
                    <span>Total: ${items.length} item${items.length !== 1 ? 's' : ''}</span>
                    <span class="shopping-total">💰 ${totalCost}g</span>
                </div>
                ${itemsHtml}
            `;
            document.getElementById('itemCount').textContent = `${items.length} item${items.length !== 1 ? 's' : ''} to buy`;
        }

        function updateTimestamp() {
            const secondsAgo = Math.floor((Date.now() - lastUpdateTime) / 1000);
            let text;
            if (secondsAgo < 5) {
                text = 'Just now';
            } else if (secondsAgo < 60) {
                text = `${secondsAgo}s ago`;
            } else {
                text = `${Math.floor(secondsAgo / 60)}m ago`;
            }
            document.getElementById('lastUpdate').textContent = text;
        }

        // Initialize
        document.getElementById('viewSelector').value = currentView;
        document.getElementById('craftingViewSelector').value = craftingView;
        switchTab(currentTab);

        // Auto-refresh every 3 seconds
        setInterval(loadData, 3000);

        // Update timestamp every second
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>
