<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorageBuddy Overlay</title>
    <link rel="stylesheet" href="/static/themes.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            padding: 0;
            min-width: 320px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .container {
            background: var(--bg-page);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-icon {
            font-size: 20px;
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .header-version {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .connection-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .connection-status.connected {
            color: var(--success);
        }

        .connection-status.disconnected {
            color: var(--danger);
        }

        .tabs {
            display: flex;
            background: var(--overlay-controls-bg);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--overlay-tab-text);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: var(--overlay-tab-hover);
            background: var(--overlay-item-bg);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .controls {
            padding: 10px 12px;
            background: var(--overlay-controls-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .view-selector {
            flex: 1;
            background: var(--overlay-input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .view-selector option {
            background: var(--overlay-input-bg);
            color: var(--text-primary);
        }

        .region-selector {
            background: var(--overlay-input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            min-width: 100px;
        }

        .region-selector option {
            background: var(--overlay-input-bg);
            color: var(--text-primary);
        }

        .content {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            background: var(--overlay-content-bg);
            min-height: 0;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: var(--overlay-item-bg);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--accent);
            opacity: 0.5;
            border-radius: 3px;
        }

        /* Quest styles */
        .quest-group {
            margin-bottom: 12px;
            background: var(--overlay-item-bg);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid var(--accent);
        }

        .quest-group.ready {
            border-left-color: var(--success);
            background: var(--success-light);
        }

        .quest-group.buyable {
            border-left-color: var(--warning);
            background: var(--warning-light);
        }

        .quest-group.needs-favor {
            border-left-color: var(--favor);
            background: var(--favor-light);
        }

        .quest-group.craftable {
            border-left-color: #17a2b8;
            background: rgba(23, 162, 184, 0.1);
        }

        .quest-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: var(--overlay-item-bg);
            border-radius: 4px;
            font-size: 12px;
        }

        .item.completed {
            background: var(--success-light);
        }

        .item-name {
            flex: 1;
            color: var(--overlay-item-text);
            min-width: 120px;
        }

        .item.completed .item-name {
            color: var(--success);
        }

        .item-progress {
            font-weight: 600;
            color: var(--warning);
            font-size: 11px;
        }

        .item.completed .item-progress {
            color: var(--success);
        }

        .item-details {
            width: 100%;
            font-size: 10px;
            color: var(--accent);
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid var(--border-color);
        }

        .vendor-info {
            color: var(--warning);
            font-size: 10px;
        }

        .vendor-info.needs-favor {
            color: var(--favor);
        }

        .source-info {
            color: var(--accent);
            font-size: 10px;
        }

        .wiki-link {
            color: var(--accent);
            text-decoration: underline;
            margin-left: 4px;
        }

        .wiki-link:hover {
            color: var(--warning);
        }

        .craft-info {
            color: #17a2b8;
            font-size: 10px;
            margin-top: 2px;
        }

        .craft-info.no-skill {
            color: #6c757d;
        }

        /* Recipe/Crafting styles */
        .recipe-group {
            margin-bottom: 10px;
            background: var(--overlay-item-bg);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid var(--accent);
        }

        .recipe-group.ready {
            border-left-color: var(--success);
            background: var(--success-light);
        }

        .recipe-group.buyable {
            border-left-color: var(--warning);
            background: var(--warning-light);
        }

        .recipe-group.needs-favor {
            border-left-color: var(--favor);
            background: var(--favor-light);
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .recipe-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .recipe-qty {
            font-size: 11px;
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .recipe-skill {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Shopping cart styles */
        .shopping-item {
            margin-bottom: 10px;
            background: var(--overlay-item-bg);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid var(--accent);
        }

        .shopping-item.buyable {
            border-left-color: var(--warning);
            background: var(--warning-light);
        }

        .shopping-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .shopping-header .item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .shopping-header .item-progress {
            font-size: 11px;
            color: var(--danger);
            font-weight: 600;
        }

        .item-recipes {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            font-style: italic;
        }

        .shopping-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 10px;
            background: var(--warning-light);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--warning);
        }

        .shopping-total {
            color: var(--warning);
        }

        /* Empty/Error states */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .empty-state-hint {
            font-size: 11px;
            margin-top: 8px;
            color: var(--text-muted);
        }

        .error-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--danger);
            font-size: 12px;
            line-height: 1.5;
        }

        /* Character panel styles */
        .character-header {
            padding: 10px;
            background: var(--overlay-item-bg);
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: center;
        }

        .character-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .section-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            padding: 8px 10px;
            background: var(--overlay-item-bg);
            border-radius: 6px 6px 0 0;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header:first-child {
            margin-top: 0;
        }

        .section-count {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .skill-list, .favor-list {
            background: var(--overlay-item-bg);
            border-radius: 0 0 6px 6px;
            padding: 6px;
        }

        .skill-item, .favor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .skill-item:hover, .favor-item:hover {
            background: var(--overlay-content-bg);
        }

        .skill-name, .favor-npc {
            color: var(--overlay-item-text);
            flex: 1;
        }

        .skill-level {
            font-weight: 600;
            color: var(--accent);
            min-width: 40px;
            text-align: right;
        }

        .skill-level .bonus {
            color: var(--success);
            font-size: 10px;
        }

        .favor-level {
            font-weight: 600;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
        }

        .favor-level.neutral { background: var(--overlay-content-bg); color: var(--text-muted); }
        .favor-level.comfortable { background: #e8f5e9; color: #2e7d32; }
        .favor-level.friends { background: #e3f2fd; color: #1565c0; }
        .favor-level.close-friends { background: #e1f5fe; color: #0277bd; }
        .favor-level.best-friends { background: #f3e5f5; color: #7b1fa2; }
        .favor-level.like-family { background: #fce4ec; color: #c2185b; }
        .favor-level.soul-mates { background: #fff3e0; color: #e65100; }

        /* Dark theme favor colors */
        [data-theme="dark"] .favor-level.comfortable { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        [data-theme="dark"] .favor-level.friends { background: rgba(33, 150, 243, 0.2); color: #64b5f6; }
        [data-theme="dark"] .favor-level.close-friends { background: rgba(3, 169, 244, 0.2); color: #4fc3f7; }
        [data-theme="dark"] .favor-level.best-friends { background: rgba(156, 39, 176, 0.2); color: #ba68c8; }
        [data-theme="dark"] .favor-level.like-family { background: rgba(233, 30, 99, 0.2); color: #f06292; }
        [data-theme="dark"] .favor-level.soul-mates { background: rgba(255, 152, 0, 0.2); color: #ffb74d; }

        /* High contrast accessibility theme */
        [data-theme="high-contrast"] .favor-level.comfortable { background: #003300; color: #00ff00; border: 1px solid #00ff00; }
        [data-theme="high-contrast"] .favor-level.friends { background: #001144; color: #00aaff; border: 1px solid #00aaff; }
        [data-theme="high-contrast"] .favor-level.close-friends { background: #002255; color: #00ccff; border: 1px solid #00ccff; }
        [data-theme="high-contrast"] .favor-level.best-friends { background: #330044; color: #ff66ff; border: 1px solid #ff66ff; }
        [data-theme="high-contrast"] .favor-level.like-family { background: #440022; color: #ff88aa; border: 1px solid #ff88aa; }
        [data-theme="high-contrast"] .favor-level.soul-mates { background: #442200; color: #ffaa00; border: 1px solid #ffaa00; }

        [data-theme="high-contrast"] .quest-item,
        [data-theme="high-contrast"] .recipe-item,
        [data-theme="high-contrast"] .material-item {
            font-weight: 600;
            border: 2px solid var(--border-color);
            font-size: 13px;
        }

        [data-theme="high-contrast"] .quest-name {
            font-weight: 700;
            font-size: 14px;
        }

        [data-theme="high-contrast"] .tab-btn {
            font-weight: 700;
            border: 2px solid var(--border-color);
        }

        [data-theme="high-contrast"] .tab-btn.active {
            border-color: #ffff00;
        }

        [data-theme="high-contrast"] .status-have { color: #00ff00 !important; }
        [data-theme="high-contrast"] .status-buy { color: #ffaa00 !important; }
        [data-theme="high-contrast"] .status-favor { color: #ff66ff !important; }
        [data-theme="high-contrast"] .status-gather { color: #00ccff !important; }

        .search-box {
            width: 100%;
            background: var(--overlay-input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 6px 10px;
            font-size: 12px;
            outline: none;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .status-bar {
            padding: 8px 12px;
            background: var(--overlay-controls-bg);
            border-top: 1px solid var(--border-color);
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .open-app-link {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .open-app-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-icon">📦</span>
            <span class="header-title">StorageBuddy</span>
            <span class="header-version">v{{ version }}</span>
            <span class="connection-status" id="connectionStatus">Connected</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="questsTab" data-tab="quests">Quests</button>
            <button class="tab-btn" id="craftingTab" data-tab="crafting">Crafting</button>
            <button class="tab-btn" id="characterTab" data-tab="character">Character</button>
        </div>

        <div class="controls" id="questControls">
            <select class="view-selector" id="viewSelector">
                <option value="all">All</option>
                <option value="ready">Ready</option>
                <option value="pinned">Pinned</option>
            </select>
            <select class="region-selector" id="regionSelector">
                <option value="">All Regions</option>
            </select>
        </div>

        <div class="controls" id="craftingControls" style="display: none;">
            <select class="view-selector" id="craftingViewSelector">
                <option value="pinned">Pinned</option>
                <option value="ready">Ready</option>
            </select>
        </div>

        <div class="controls" id="characterControls" style="display: none;">
            <select class="view-selector" id="characterViewSelector">
                <option value="skills">Skills</option>
                <option value="favor">NPC Favor</option>
                <option value="both">Both</option>
            </select>
            <input type="text" class="search-box" id="characterSearch" placeholder="Search...">
        </div>

        <div class="content" id="content">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>Loading...</p>
            </div>
        </div>

        <div class="status-bar">
            <span id="itemCount">0 items</span>
            <a href="/" target="_blank" class="open-app-link">Open Full App</a>
            <span id="lastUpdate">Just now</span>
        </div>
    </div>

    <script>
        // Theme Management - synced with main page
        function loadTheme() {
            const savedTheme = localStorage.getItem('storagebuddy-theme') || 'sepia';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        // Check for theme changes periodically (sync with main window)
        function checkThemeSync() {
            const savedTheme = localStorage.getItem('storagebuddy-theme') || 'sepia';
            if (document.documentElement.getAttribute('data-theme') !== savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        }

        // Load theme immediately
        loadTheme();

        // Check for theme sync every second
        setInterval(checkThemeSync, 1000);

        // Sync pinned quests from main window
        function syncPinnedQuests() {
            const savedPinned = JSON.parse(localStorage.getItem('pinnedQuests') || '[]');
            const newPinned = new Set(savedPinned);
            // Check if pinned quests changed
            if (newPinned.size !== pinnedQuests.size || [...newPinned].some(q => !pinnedQuests.has(q))) {
                pinnedQuests = newPinned;
                if (currentTab === 'quests' && currentView === 'pinned') {
                    renderFilteredQuests();
                }
            }
        }
        setInterval(syncPinnedQuests, 1000);

        let currentTab = 'quests';
        let currentView = 'all';
        let currentRegion = '';
        let craftingView = 'pinned';  // Default to 'pinned' to match first dropdown option
        let characterView = 'skills';
        let characterSearch = '';
        let lastUpdateTime = Date.now();
        let isConnected = true;
        let allQuests = [];
        let allRecipes = [];
        let characterData = null;
        // Pinned quests - synced from main window
        let pinnedQuests = new Set(JSON.parse(localStorage.getItem('pinnedQuests') || '[]'));

        // Load saved preferences from localStorage
        const savedPrefs = JSON.parse(localStorage.getItem('overlayPrefs') || '{}');
        if (savedPrefs.tab) currentTab = savedPrefs.tab;
        if (savedPrefs.view) currentView = savedPrefs.view;
        if (savedPrefs.region) currentRegion = savedPrefs.region;
        if (savedPrefs.craftingView) craftingView = savedPrefs.craftingView;
        if (savedPrefs.characterView) characterView = savedPrefs.characterView;

        function savePrefs() {
            localStorage.setItem('overlayPrefs', JSON.stringify({
                tab: currentTab,
                view: currentView,
                region: currentRegion,
                craftingView: craftingView,
                characterView: characterView
            }));
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tab = e.target.dataset.tab;
                switchTab(tab);
                savePrefs();
            });
        });

        function switchTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            document.getElementById('questControls').style.display = tab === 'quests' ? 'flex' : 'none';
            document.getElementById('craftingControls').style.display = tab === 'crafting' ? 'flex' : 'none';
            document.getElementById('characterControls').style.display = tab === 'character' ? 'flex' : 'none';

            loadData();
        }

        // View selector change
        document.getElementById('viewSelector').addEventListener('change', (e) => {
            currentView = e.target.value;
            savePrefs();
            loadData();
        });

        // Region selector change
        document.getElementById('regionSelector').addEventListener('change', (e) => {
            currentRegion = e.target.value;
            savePrefs();
            renderFilteredQuests();
        });

        // Crafting view selector change
        document.getElementById('craftingViewSelector').addEventListener('change', (e) => {
            craftingView = e.target.value;
            savePrefs();
            // Must reload data since pinned and ready use different API endpoints
            loadCraftingData();
        });

        // Character view selector change
        document.getElementById('characterViewSelector').addEventListener('change', (e) => {
            characterView = e.target.value;
            savePrefs();
            renderCharacterView();
        });

        // Character search input
        document.getElementById('characterSearch').addEventListener('input', (e) => {
            characterSearch = e.target.value.toLowerCase();
            renderCharacterView();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateRegionSelector(quests) {
            const regionSelector = document.getElementById('regionSelector');
            const regions = [...new Set(quests.map(q => q.location).filter(Boolean))].sort();

            const currentSelection = regionSelector.value;

            regionSelector.innerHTML = '<option value="">All Regions</option>';
            regions.forEach(region => {
                const option = document.createElement('option');
                option.value = region;
                option.textContent = region;
                regionSelector.appendChild(option);
            });

            if (currentRegion && regions.includes(currentRegion)) {
                regionSelector.value = currentRegion;
            } else if (currentSelection && regions.includes(currentSelection)) {
                regionSelector.value = currentSelection;
            }
        }

        async function loadData() {
            const content = document.getElementById('content');
            const statusEl = document.getElementById('connectionStatus');

            try {
                if (currentTab === 'quests') {
                    await loadQuestData();
                } else if (currentTab === 'crafting') {
                    await loadCraftingData();
                } else if (currentTab === 'character') {
                    await loadCharacterData();
                }

                isConnected = true;
                statusEl.textContent = 'Connected';
                statusEl.className = 'connection-status connected';

                lastUpdateTime = Date.now();
                updateTimestamp();
            } catch (error) {
                console.error('Error loading data:', error);
                isConnected = false;
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'connection-status disconnected';

                content.innerHTML = `
                    <div class="error-state">
                        <div style="font-size: 24px; margin-bottom: 10px;">⚠️</div>
                        Cannot connect to StorageBuddy
                    </div>
                `;
            }
        }

        async function loadQuestData() {
            // Always fetch active quests, filter client-side based on view
            const response = await fetch(`/api/overlay_data?view=active`);

            if (!response.ok) throw new Error('Server not responding');

            const data = await response.json();
            allQuests = data.data?.quests || [];
            updateRegionSelector(allQuests);
            renderFilteredQuests();
        }

        function renderFilteredQuests() {
            const content = document.getElementById('content');
            let quests = allQuests;

            // Filter by view type
            if (currentView === 'pinned') {
                quests = quests.filter(q => pinnedQuests.has(q.internal_name));
            } else if (currentView === 'ready') {
                // Ready = completable (have all items) OR can obtain missing items
                // Items can be obtained via: purchase (with favor), crafting (with skill)
                quests = quests.filter(q => {
                    const isCompletable = q.items.every(item => item.have >= item.need);
                    if (isCompletable) return true;

                    // Check if all missing items can be obtained
                    const canObtainAll = q.items.every(item => {
                        if (item.have >= item.need) return true;
                        // Can buy with favor
                        if (item.is_buyable && item.favor_met) return true;
                        // Can craft with skill
                        if (item.is_craftable && item.recipe?.has_skill) return true;
                        return false;
                    });
                    return canObtainAll;
                });
            }

            // Filter by region
            if (currentRegion) {
                quests = quests.filter(q => q.location === currentRegion);
            }

            if (quests.length === 0) {
                let emptyMessage;
                if (currentView === 'pinned') {
                    emptyMessage = 'No pinned quests. Pin quests from the main app.';
                } else if (currentView === 'ready') {
                    emptyMessage = 'No quests ready to complete';
                } else if (currentRegion) {
                    emptyMessage = `No quests in ${currentRegion}`;
                } else {
                    emptyMessage = 'No active quests with items';
                }
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>${emptyMessage}</p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 quests';
                return;
            }

            const questsHtml = quests.map(quest => {
                const isReady = quest.items.every(item => item.have >= item.need);
                // Buyable = has vendor AND player has favor
                const isBuyable = !isReady && quest.items.some(item => item.is_buyable && item.favor_met);
                // Craftable = can craft missing items with current skills
                const isCraftable = !isReady && !isBuyable && quest.items.some(item =>
                    item.have < item.need && item.is_craftable && item.recipe?.has_skill
                );
                // Needs favor = has vendor but player lacks favor for all vendors
                const needsFavor = !isReady && !isBuyable && !isCraftable && quest.items.some(item => item.needs_favor);
                let questClass = 'quest-group';
                if (isReady) questClass = 'quest-group ready';
                else if (isBuyable) questClass = 'quest-group buyable';
                else if (isCraftable) questClass = 'quest-group craftable';
                else if (needsFavor) questClass = 'quest-group needs-favor';

                const itemsHtml = quest.items.map(item => {
                    const isCompleted = item.have >= item.need;
                    const itemClass = isCompleted ? 'item completed' : 'item';

                    let detailsHtml = '';
                    const total = (item.in_inventory || 0) + (item.in_storage || 0);
                    if (total > 0) {
                        let locationParts = [];
                        if (item.in_inventory) locationParts.push(`📦 Inventory: ${item.in_inventory}`);
                        if (item.storage_locations) {
                            for (const [location, count] of Object.entries(item.storage_locations)) {
                                let icon = '🏦';
                                let shortName = location;
                                if (location.toLowerCase().includes('saddlebag')) {
                                    icon = '🎒';
                                    shortName = 'Saddlebag';
                                }
                                locationParts.push(`${icon} ${shortName}: ${count}`);
                            }
                        }
                        if (locationParts.length > 0) {
                            detailsHtml += `<div class="item-details">${locationParts.join(' • ')}</div>`;
                        }
                    }
                    // Show craftable info if item is craftable and not completed
                    if (item.is_craftable && !isCompleted && item.recipe) {
                        const recipe = item.recipe;
                        const skillClass = recipe.has_skill ? 'craft-info' : 'craft-info no-skill';
                        const skillInfo = recipe.has_skill
                            ? `${recipe.skill} ${recipe.level}`
                            : `${recipe.skill} ${recipe.level} (need +${recipe.skill_gap})`;
                        detailsHtml += `<div class="${skillClass}">🔨 ${escapeHtml(recipe.name)} - ${skillInfo}</div>`;
                    }
                    // Always show source - where to get more of this item
                    if (item.vendor_info) {
                        const vendorClass = item.needs_favor ? 'vendor-info needs-favor' : 'vendor-info';
                        detailsHtml += `<div class="${vendorClass}">🛒 ${escapeHtml(item.vendor_info)}</div>`;
                    } else if (!item.is_craftable) {
                        // Not craftable, not buyable - must be gathered, show wiki link
                        const wikiUrl = `https://wiki.projectgorgon.com/wiki/Special:Search?search=${encodeURIComponent(item.name)}`;
                        detailsHtml += `<div class="source-info">🔍 Gather <a href="${wikiUrl}" target="_blank" class="wiki-link">📖 Wiki</a></div>`;
                    }

                    return `
                        <div class="${itemClass}">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <span class="item-progress">${item.have}/${item.need}</span>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');

                return `
                    <div class="${questClass}">
                        <div class="quest-name">${escapeHtml(quest.name)}</div>
                        <div class="item-list">${itemsHtml}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = questsHtml;
            document.getElementById('itemCount').textContent = `${quests.length} quest${quests.length !== 1 ? 's' : ''}`;
        }

        async function loadCraftingData() {
            // Use different endpoints for pinned vs ready views
            const endpoint = craftingView === 'ready' ? '/api/ready_recipes' : '/api/shopping_list';
            const response = await fetch(endpoint);

            if (!response.ok) throw new Error('Server not responding');

            const data = await response.json();
            allRecipes = data.recipes || data.data?.recipes || [];

            // For pinned view: if server returns empty but we have pins in localStorage,
            // sync localStorage to server (handles server restart scenario)
            if (craftingView === 'pinned' && allRecipes.length === 0) {
                const localPins = JSON.parse(localStorage.getItem('recipeQuantities') || '{}');
                if (Object.keys(localPins).length > 0) {
                    console.log('Server has no pins, syncing from localStorage...');
                    await syncLocalPinsToServer(localPins);
                    // Reload data after sync
                    const retryResponse = await fetch('/api/shopping_list');
                    if (retryResponse.ok) {
                        const retryData = await retryResponse.json();
                        allRecipes = retryData.recipes || retryData.data?.recipes || [];
                    }
                }
            }

            renderCraftingView();
        }

        /**
         * Sync localStorage pinned recipes to server.
         * Used when overlay detects server has no pins but localStorage does.
         */
        async function syncLocalPinsToServer(localPins) {
            try {
                // Build recipe data in the format the server expects
                const recipes = {};
                for (const [recipeId, qty] of Object.entries(localPins)) {
                    // qty might be a number or an object with quantity property
                    const quantity = typeof qty === 'object' ? (qty.quantity || 1) : (qty || 1);
                    recipes[recipeId] = quantity;
                }

                await fetch('/api/shopping_list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipes })
                });
                console.log('Synced', Object.keys(recipes).length, 'pins to server');
            } catch (error) {
                console.error('Failed to sync pins to server:', error);
            }
        }

        function renderCraftingView() {
            const content = document.getElementById('content');

            if (allRecipes.length === 0) {
                const emptyMessage = craftingView === 'ready'
                    ? { icon: '📦', title: 'No recipes ready to craft', hint: 'Gather more materials to craft recipes' }
                    : { icon: '🔨', title: 'No recipes pinned', hint: 'Pin recipes in the main app to see them here' };

                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${emptyMessage.icon}</div>
                        <p>${emptyMessage.title}</p>
                        <p class="empty-state-hint">${emptyMessage.hint}</p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = craftingView === 'ready' ? '0 recipes ready' : '0 recipes';
                return;
            }

            // Handle view rendering - default to 'pinned' for any unknown value
            if (craftingView === 'ready') {
                renderReadyRecipes(content);
            } else {
                // 'pinned' or any other value defaults to pinned view
                renderPinnedRecipes(content);
            }
        }

        function renderPinnedRecipes(content) {
            // Aggregate all materials across all pinned recipes
            const aggregatedMaterials = {};

            for (const recipe of allRecipes) {
                for (const mat of recipe.materials) {
                    if (!aggregatedMaterials[mat.name]) {
                        aggregatedMaterials[mat.name] = {
                            name: mat.name,
                            need: 0,
                            have: 0,
                            in_inventory: mat.in_inventory || 0,
                            in_storage: mat.in_storage || 0,
                            storage_locations: mat.storage_locations || {},
                            vendor_info: mat.vendor_info,
                            needs_favor: mat.needs_favor,
                            recipes: []
                        };
                    }
                    aggregatedMaterials[mat.name].need += mat.need;
                    // have is capped at need per-recipe, so we use max of storage totals
                    const totalHave = (mat.in_inventory || 0) + (mat.in_storage || 0);
                    aggregatedMaterials[mat.name].have = totalHave;
                    aggregatedMaterials[mat.name].recipes.push(`${recipe.name} (×${recipe.quantity})`);
                }
            }

            // Sort: incomplete items first, then by name
            const materials = Object.values(aggregatedMaterials).sort((a, b) => {
                const aComplete = a.have >= a.need;
                const bComplete = b.have >= b.need;
                if (aComplete !== bComplete) return aComplete ? 1 : -1;
                return a.name.localeCompare(b.name);
            });

            const materialsHtml = materials.map(mat => {
                const isCompleted = mat.have >= mat.need;
                const itemClass = isCompleted ? 'item completed' : 'item';

                let detailsHtml = '';
                const total = mat.in_inventory + mat.in_storage;
                if (total > 0) {
                    let locationParts = [];
                    if (mat.in_inventory) locationParts.push(`📦 Inventory: ${mat.in_inventory}`);
                    if (mat.storage_locations && Object.keys(mat.storage_locations).length > 0) {
                        for (const [location, count] of Object.entries(mat.storage_locations)) {
                            let icon = '🏦';
                            let shortName = location;
                            if (location.toLowerCase().includes('saddlebag')) {
                                icon = '🎒';
                                shortName = 'Saddlebag';
                            } else if (location.toLowerCase().includes('dream')) {
                                icon = '💤';
                            } else if (location.toLowerCase().includes('community')) {
                                icon = '🏠';
                            }
                            locationParts.push(`${icon} ${shortName}: ${count}`);
                        }
                    } else if (mat.in_storage) {
                        locationParts.push(`🏦 Storage: ${mat.in_storage}`);
                    }
                    if (locationParts.length > 0) {
                        detailsHtml += `<div class="item-details">${locationParts.join(' • ')}</div>`;
                    }
                }

                // Always show source - where to get more of this item
                if (mat.vendor_info) {
                    const vendorClass = mat.needs_favor ? 'vendor-info needs-favor' : 'vendor-info';
                    detailsHtml += `<div class="${vendorClass}">🛒 ${escapeHtml(mat.vendor_info)}</div>`;
                } else {
                    // No vendor - must be gathered/farmed, show wiki link
                    const wikiUrl = `https://wiki.projectgorgon.com/wiki/Special:Search?search=${encodeURIComponent(mat.name)}`;
                    detailsHtml += `<div class="source-info">🔍 Gather <a href="${wikiUrl}" target="_blank" class="wiki-link">📖 Wiki</a></div>`;
                }

                // Show which recipes need this material
                detailsHtml += `<div class="item-recipes">For: ${mat.recipes.join(', ')}</div>`;

                return `
                    <div class="${itemClass}">
                        <span class="item-name">${escapeHtml(mat.name)}</span>
                        <span class="item-progress">${Math.min(mat.have, mat.need)}/${mat.need}</span>
                        ${detailsHtml}
                    </div>
                `;
            }).join('');

            // Header showing recipe count
            const headerHtml = `
                <div class="section-header">
                    All Pinned Recipe Materials
                    <span class="section-count">${materials.length} unique across ${allRecipes.length} recipes</span>
                </div>
            `;

            content.innerHTML = headerHtml + `<div class="item-list">${materialsHtml}</div>`;
            document.getElementById('itemCount').textContent = `${allRecipes.length} recipe${allRecipes.length !== 1 ? 's' : ''}, ${materials.length} materials`;
        }

        function renderReadyRecipes(content) {
            // For Ready view, aggregate all materials across all ready recipes
            const aggregatedMaterials = {};

            for (const recipe of allRecipes) {
                for (const mat of recipe.materials) {
                    if (!aggregatedMaterials[mat.name]) {
                        aggregatedMaterials[mat.name] = {
                            name: mat.name,
                            need: 0,
                            have: 0,
                            in_inventory: mat.in_inventory || 0,
                            in_storage: mat.in_storage || 0,
                            storage_locations: mat.storage_locations || {},
                            vendor_info: mat.vendor_info,
                            needs_favor: mat.needs_favor,
                            recipes: []
                        };
                    }
                    aggregatedMaterials[mat.name].need += mat.need;
                    const totalHave = (mat.in_inventory || 0) + (mat.in_storage || 0);
                    aggregatedMaterials[mat.name].have = totalHave;
                    aggregatedMaterials[mat.name].recipes.push(`${recipe.name} (×${recipe.quantity})`);
                }
            }

            // Sort alphabetically for ready view
            const materials = Object.values(aggregatedMaterials).sort((a, b) =>
                a.name.localeCompare(b.name)
            );

            if (materials.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>No recipes ready to craft</p>
                        <p class="empty-state-hint">
                            Gather more materials to craft recipes
                        </p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 recipes ready';
                return;
            }

            const materialsHtml = materials.map(mat => {
                let detailsHtml = '';
                const total = mat.in_inventory + mat.in_storage;
                if (total > 0) {
                    let locationParts = [];
                    if (mat.in_inventory) locationParts.push(`📦 Inventory: ${mat.in_inventory}`);
                    if (mat.storage_locations && Object.keys(mat.storage_locations).length > 0) {
                        for (const [location, count] of Object.entries(mat.storage_locations)) {
                            let icon = '🏦';
                            let shortName = location;
                            if (location.toLowerCase().includes('saddlebag')) {
                                icon = '🎒';
                                shortName = 'Saddlebag';
                            } else if (location.toLowerCase().includes('dream')) {
                                icon = '💤';
                            } else if (location.toLowerCase().includes('community')) {
                                icon = '🏠';
                            }
                            locationParts.push(`${icon} ${shortName}: ${count}`);
                        }
                    } else if (mat.in_storage) {
                        locationParts.push(`🏦 Storage: ${mat.in_storage}`);
                    }
                    if (locationParts.length > 0) {
                        detailsHtml += `<div class="item-details">${locationParts.join(' • ')}</div>`;
                    }
                }

                // Always show source
                if (mat.vendor_info) {
                    const vendorClass = mat.needs_favor ? 'vendor-info needs-favor' : 'vendor-info';
                    detailsHtml += `<div class="${vendorClass}">🛒 ${escapeHtml(mat.vendor_info)}</div>`;
                } else {
                    const wikiUrl = `https://wiki.projectgorgon.com/wiki/Special:Search?search=${encodeURIComponent(mat.name)}`;
                    detailsHtml += `<div class="source-info">🔍 Gather <a href="${wikiUrl}" target="_blank" class="wiki-link">📖 Wiki</a></div>`;
                }

                // Show which recipes need this material
                detailsHtml += `<div class="item-recipes">For: ${mat.recipes.join(', ')}</div>`;

                return `
                    <div class="item completed">
                        <span class="item-name">${escapeHtml(mat.name)}</span>
                        <span class="item-progress">${Math.min(mat.have, mat.need)}/${mat.need}</span>
                        ${detailsHtml}
                    </div>
                `;
            }).join('');

            // Header showing recipe count
            const headerHtml = `
                <div class="section-header">
                    All Ready Recipe Materials
                    <span class="section-count">${materials.length} unique across ${allRecipes.length} recipes</span>
                </div>
            `;

            content.innerHTML = headerHtml + `<div class="item-list">${materialsHtml}</div>`;
            document.getElementById('itemCount').textContent = `${allRecipes.length} recipe${allRecipes.length !== 1 ? 's' : ''} ready, ${materials.length} materials`;
        }

        function renderShoppingCart(content) {
            const shoppingItems = {};

            for (const recipe of allRecipes) {
                for (const mat of recipe.materials) {
                    const missing = mat.need - mat.have;
                    if (missing <= 0 || !mat.vendors || mat.vendors.length === 0) continue;

                    if (!shoppingItems[mat.name]) {
                        shoppingItems[mat.name] = {
                            name: mat.name,
                            totalNeed: 0,
                            totalHave: 0,
                            vendors: mat.vendors,
                            recipes: []
                        };
                    }

                    shoppingItems[mat.name].totalNeed += mat.need;
                    shoppingItems[mat.name].totalHave += mat.have;
                    shoppingItems[mat.name].recipes.push(`${recipe.name} (×${recipe.quantity})`);
                }
            }

            const items = Object.values(shoppingItems);

            if (items.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <p>Shopping cart is empty</p>
                        <p class="empty-state-hint">
                            No vendor-purchasable materials needed
                        </p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = '0 items to buy';
                return;
            }

            items.sort((a, b) => {
                const aLoc = a.vendors[0]?.location || '';
                const bLoc = b.vendors[0]?.location || '';
                if (aLoc !== bLoc) return aLoc.localeCompare(bLoc);
                return a.name.localeCompare(b.name);
            });

            let totalCost = 0;
            items.forEach(item => {
                const missing = item.totalNeed - item.totalHave;
                const price = item.vendors[0]?.price || 0;
                totalCost += missing * price;
            });

            const itemsHtml = items.map(item => {
                const missing = item.totalNeed - item.totalHave;
                const vendor = item.vendors[0];
                const itemCost = missing * (vendor?.price || 0);

                return `
                    <div class="shopping-item buyable">
                        <div class="shopping-header">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <span class="item-progress">Buy ${missing}</span>
                        </div>
                        <div class="vendor-info">
                            🛒 ${escapeHtml(vendor.vendor)} (${escapeHtml(vendor.location)})<br>
                            💰 ${vendor.price}g each = ${itemCost}g total<br>
                            ⭐ Requires: ${escapeHtml(vendor.favor)} favor
                        </div>
                        <div class="item-recipes">For: ${item.recipes.join(', ')}</div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `
                <div class="shopping-summary">
                    <span>Total: ${items.length} item${items.length !== 1 ? 's' : ''}</span>
                    <span class="shopping-total">💰 ${totalCost}g</span>
                </div>
                ${itemsHtml}
            `;
            document.getElementById('itemCount').textContent = `${items.length} item${items.length !== 1 ? 's' : ''} to buy`;
        }

        async function loadCharacterData() {
            const response = await fetch('/api/character_info');

            if (!response.ok) throw new Error('Server not responding');

            const data = await response.json();
            characterData = data.data || {};
            renderCharacterView();
        }

        function renderCharacterView() {
            const content = document.getElementById('content');

            if (!characterData || (!characterData.skills && !characterData.favor)) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👤</div>
                        <p>No character data available</p>
                        <p class="empty-state-hint">Export your character from the game</p>
                    </div>
                `;
                document.getElementById('itemCount').textContent = 'No data';
                return;
            }

            let html = '';

            // Character header
            html += `
                <div class="character-header">
                    <div class="character-name">${escapeHtml(characterData.character || 'Unknown')}</div>
                </div>
            `;

            const showSkills = characterView === 'skills' || characterView === 'both';
            const showFavor = characterView === 'favor' || characterView === 'both';

            // Skills section
            if (showSkills && characterData.skills) {
                const skills = Object.entries(characterData.skills)
                    .filter(([name, data]) => {
                        if (!characterSearch) return true;
                        return name.toLowerCase().includes(characterSearch);
                    })
                    .sort((a, b) => b[1].effectiveLevel - a[1].effectiveLevel);

                html += `
                    <div class="section-header">
                        Skills
                        <span class="section-count">${skills.length} skills</span>
                    </div>
                    <div class="skill-list">
                `;

                if (skills.length === 0) {
                    html += `<div class="empty-state" style="padding: 20px;">No matching skills</div>`;
                } else {
                    for (const [name, data] of skills) {
                        const bonusText = data.bonusLevels > 0 ? `<span class="bonus">+${data.bonusLevels}</span>` : '';
                        html += `
                            <div class="skill-item">
                                <span class="skill-name">${escapeHtml(name)}</span>
                                <span class="skill-level">${data.level}${bonusText}</span>
                            </div>
                        `;
                    }
                }

                html += `</div>`;
            }

            // Favor section
            if (showFavor && characterData.favor) {
                const favorLevels = characterData.favor_levels || [];
                const favor = Object.entries(characterData.favor)
                    .filter(([npc, data]) => {
                        if (!characterSearch) return true;
                        return npc.toLowerCase().includes(characterSearch) ||
                               data.level.toLowerCase().includes(characterSearch);
                    })
                    .sort((a, b) => b[1].rank - a[1].rank);

                html += `
                    <div class="section-header">
                        NPC Favor
                        <span class="section-count">${favor.length} NPCs</span>
                    </div>
                    <div class="favor-list">
                `;

                if (favor.length === 0) {
                    html += `<div class="empty-state" style="padding: 20px;">No matching NPCs</div>`;
                } else {
                    for (const [npc, data] of favor) {
                        const levelClass = data.level.toLowerCase().replace(/\s+/g, '-');
                        html += `
                            <div class="favor-item">
                                <span class="favor-npc">${escapeHtml(npc)}</span>
                                <span class="favor-level ${levelClass}">${escapeHtml(data.level)}</span>
                            </div>
                        `;
                    }
                }

                html += `</div>`;
            }

            content.innerHTML = html;

            // Update item count
            const skillCount = showSkills && characterData.skills ? Object.keys(characterData.skills).length : 0;
            const favorCount = showFavor && characterData.favor ? Object.keys(characterData.favor).length : 0;

            if (showSkills && showFavor) {
                document.getElementById('itemCount').textContent = `${skillCount} skills, ${favorCount} NPCs`;
            } else if (showSkills) {
                document.getElementById('itemCount').textContent = `${skillCount} skills`;
            } else {
                document.getElementById('itemCount').textContent = `${favorCount} NPCs`;
            }
        }

        function updateTimestamp() {
            const secondsAgo = Math.floor((Date.now() - lastUpdateTime) / 1000);
            let text;
            if (secondsAgo < 5) {
                text = 'Just now';
            } else if (secondsAgo < 60) {
                text = `${secondsAgo}s ago`;
            } else {
                text = `${Math.floor(secondsAgo / 60)}m ago`;
            }
            document.getElementById('lastUpdate').textContent = text;
        }

        // Initialize
        document.getElementById('viewSelector').value = currentView;
        document.getElementById('craftingViewSelector').value = craftingView;
        document.getElementById('characterViewSelector').value = characterView;
        switchTab(currentTab);

        // Auto-refresh every 3 seconds
        setInterval(loadData, 3000);

        // Update timestamp every second
        setInterval(updateTimestamp, 1000);
    </script>
