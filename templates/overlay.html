<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Tracker Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            color: #ffffff;
            padding: 10px;
            user-select: none;
            -webkit-app-region: drag;
        }

        .container {
            background: rgba(20, 20, 30, 0.92);
            border-radius: 12px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            max-width: 100%;
        }

        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: move;
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .view-selector {
            -webkit-app-region: no-drag;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .view-selector option {
            background: #2a2a3a;
            color: white;
        }

        .content {
            padding: 10px;
            max-height: 450px;
            overflow-y: auto;
            -webkit-app-region: no-drag;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        .quest-group {
            margin-bottom: 15px;
        }

        .quest-name {
            font-size: 13px;
            font-weight: 600;
            color: #a8b2ff;
            margin-bottom: 6px;
            padding: 4px 6px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 4px;
        }

        .item-list {
            margin-left: 8px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            margin-bottom: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 12px;
        }

        .item.completed {
            background: rgba(76, 175, 80, 0.2);
        }

        .item-name {
            flex: 1;
            color: #e0e0e0;
        }

        .item-progress {
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        .item-progress.completed {
            color: #76ff76;
        }

        .item-progress.incomplete {
            color: #ffaa66;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        .status-bar {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Quest Tracker</div>
            <select class="view-selector" id="viewSelector" onchange="switchView()">
                <option value="completable">Ready</option>
                <option value="purchasable">Buyable</option>
                <option value="active">Active</option>
            </select>
        </div>

        <div class="content" id="content">
            <div class="loading">Loading...</div>
        </div>

        <div class="status-bar">
            <span id="questCount">0 quests</span>
            <span id="lastUpdate">Just now</span>
        </div>
    </div>

    <script>
        let currentView = 'completable';
        let lastUpdateTime = Date.now();

        function switchView() {
            currentView = document.getElementById('viewSelector').value;
            loadData();
        }

        async function loadData() {
            const content = document.getElementById('content');

            try {
                const response = await fetch(`/api/overlay_data?view=${currentView}`);
                const data = await response.json();

                if (data.quests.length === 0) {
                    content.innerHTML = '<div class="empty-state">No quests found</div>';
                    document.getElementById('questCount').textContent = '0 quests';
                    return;
                }

                // Group items by quest
                const questsHtml = data.quests.map(quest => {
                    const itemsHtml = quest.items.map(item => {
                        const isCompleted = item.have >= item.need;
                        const progressClass = isCompleted ? 'completed' : 'incomplete';
                        const itemClass = isCompleted ? 'item completed' : 'item';

                        return `
                            <div class="${itemClass}">
                                <div class="item-name">${item.name}</div>
                                <div class="item-progress ${progressClass}">${item.have}/${item.need}</div>
                            </div>
                        `;
                    }).join('');

                    return `
                        <div class="quest-group">
                            <div class="quest-name">${quest.name}</div>
                            <div class="item-list">${itemsHtml}</div>
                        </div>
                    `;
                }).join('');

                content.innerHTML = questsHtml;
                document.getElementById('questCount').textContent = `${data.quests.length} quest${data.quests.length !== 1 ? 's' : ''}`;

                lastUpdateTime = Date.now();
                updateTimestamp();
            } catch (error) {
                console.error('Error loading data:', error);
                content.innerHTML = '<div class="empty-state">Error loading data</div>';
            }
        }

        function updateTimestamp() {
            const secondsAgo = Math.floor((Date.now() - lastUpdateTime) / 1000);
            let text;
            if (secondsAgo < 5) {
                text = 'Just now';
            } else if (secondsAgo < 60) {
                text = `${secondsAgo}s ago`;
            } else {
                text = `${Math.floor(secondsAgo / 60)}m ago`;
            }
            document.getElementById('lastUpdate').textContent = text;
        }

        // Initial load
        loadData();

        // Auto-refresh every 3 seconds
        setInterval(loadData, 3000);

        // Update timestamp every second
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>
