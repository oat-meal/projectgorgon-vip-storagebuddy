<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Tracker Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #14141e;
            color: #e0e0e0;
            padding: 12px;
            font-size: 13px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a3e;
        }

        .view-selector {
            flex: 1;
            padding: 6px 8px;
            background: #1e1e2e;
            border: 1px solid #2a2a3e;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 12px;
            cursor: pointer;
        }

        .view-selector:focus {
            outline: none;
            border-color: #667eea;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 12px;
        }

        .quest-count {
            color: #667eea;
        }

        .last-update {
            font-style: italic;
        }

        .quest-group {
            margin-bottom: 16px;
            background: #1e1e2e;
            border-radius: 6px;
            padding: 10px;
        }

        .quest-name {
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.3;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: #14141e;
            border-radius: 4px;
            font-size: 12px;
        }

        .item.completed {
            background: #1a2f1a;
        }

        .item-name {
            flex: 1;
            color: #b0b0b0;
        }

        .item.completed .item-name {
            color: #70d070;
        }

        .item-progress {
            margin-left: 8px;
            font-weight: 600;
            color: #888;
            font-size: 11px;
        }

        .item.completed .item-progress {
            color: #70d070;
        }

        .item-locations {
            font-size: 10px;
            color: #667eea;
            margin-top: 4px;
            padding-left: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: #ff6b6b;
            line-height: 1.5;
        }

        .error-state code {
            display: block;
            margin-top: 8px;
            padding: 4px 8px;
            background: #2a1a1a;
            border-radius: 3px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="header">
        <select id="viewSelector" class="view-selector">
            <option value="completable">Ready to Complete</option>
            <option value="purchasable">Buyable Quests</option>
            <option value="active">Active Quests</option>
        </select>
    </div>

    <div class="status-bar">
        <span class="quest-count" id="questCount">0 quests</span>
        <span class="last-update" id="lastUpdate">Loading...</span>
    </div>

    <div id="content">
        <div class="empty-state">Loading quests...</div>
    </div>

    <script src="overlay-window.js"></script>
</body>
</html>
