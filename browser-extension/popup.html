<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorageBuddy Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgb(20, 20, 30);
            color: #ffffff;
            padding: 0;
            width: 340px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .container {
            background: rgb(20, 20, 30);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-icon {
            font-size: 20px;
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .connection-status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .connection-status.connected {
            color: #76ff76;
        }

        .connection-status.disconnected {
            color: #ff6b6b;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #a8b2ff;
            border-bottom-color: #667eea;
        }

        .controls {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .view-selector {
            flex: 1;
            background: rgb(45, 45, 55);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: rgb(255, 255, 255);
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .view-selector option {
            background: #2a2a3a;
            color: white;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .zoom-button {
            background: rgb(60, 60, 75);
            border: none;
            border-radius: 4px;
            color: white;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
        }

        .zoom-button:hover {
            background: rgb(80, 80, 100);
        }

        .zoom-value {
            font-size: 10px;
            min-width: 32px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }

        .content {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            background: rgb(20, 20, 30);
            min-height: 0;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        /* Quest styles */
        .quest-group {
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid #667eea;
        }

        .quest-group.ready {
            border-left-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }

        .quest-group.buyable {
            border-left-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }

        .quest-name {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .quest-location {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 12px;
        }

        .item.completed {
            background: rgba(76, 175, 80, 0.15);
        }

        .item-name {
            flex: 1;
            color: #b0b0b0;
            min-width: 120px;
        }

        .item.completed .item-name {
            color: #70d070;
        }

        .item-progress {
            font-weight: 600;
            color: #ffaa66;
            font-size: 11px;
        }

        .item.completed .item-progress {
            color: #70d070;
        }

        .item-details {
            width: 100%;
            font-size: 10px;
            color: #667eea;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vendor-info {
            color: #ff9800;
            font-size: 10px;
        }

        /* Crafting styles */
        .recipe-group {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 10px;
            border-left: 3px solid #667eea;
        }

        .recipe-group.ready {
            border-left-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }

        .recipe-group.buyable {
            border-left-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .recipe-name {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .recipe-qty {
            font-size: 11px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .recipe-skill {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Empty/Error states */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .error-state {
            text-align: center;
            padding: 30px 20px;
            color: #ff6b6b;
            font-size: 12px;
            line-height: 1.5;
        }

        .error-state code {
            display: block;
            margin-top: 10px;
            padding: 8px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 4px;
            font-size: 11px;
        }

        .status-bar {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .open-app-link {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .open-app-link:hover {
            text-decoration: underline;
        }

        .popout-btn {
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
            border-radius: 4px;
            color: #a8b2ff;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .popout-btn:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        .pin-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.7);
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .pin-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .pin-btn.pinned {
            background: rgba(255, 193, 7, 0.3);
            border-color: rgba(255, 193, 7, 0.6);
            color: #ffc107;
        }

        .pin-btn.pinned:hover {
            background: rgba(255, 193, 7, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="header-icon">📦</span>
            <span class="header-title">StorageBuddy</span>
            <button class="pin-btn" id="pinBtn" title="Keep window on top">
                <span>📌</span> Pin
            </button>
            <button class="popout-btn" id="popoutBtn" title="Pop out to separate window">
                <span>⧉</span> Pop Out
            </button>
            <span class="connection-status" id="connectionStatus">Connecting...</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="questsTab" data-tab="quests">Quests</button>
            <button class="tab-btn" id="craftingTab" data-tab="crafting">Crafting</button>
        </div>

        <div class="controls" id="questControls">
            <select class="view-selector" id="viewSelector">
                <option value="all">All Quests</option>
                <option value="ready">Have Materials</option>
            </select>
            <div class="zoom-controls">
                <button class="zoom-button" id="zoomOut">−</button>
                <span class="zoom-value" id="zoomValue">100%</span>
                <button class="zoom-button" id="zoomIn">+</button>
            </div>
        </div>

        <div class="controls" id="craftingControls" style="display: none;">
            <span style="font-size: 11px; color: rgba(255,255,255,0.6);">Shopping list from StorageBuddy</span>
        </div>

        <div class="content" id="content">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>Loading...</p>
            </div>
        </div>

        <div class="status-bar">
            <span id="itemCount">0 items</span>
            <a href="http://127.0.0.1:5000" target="_blank" class="open-app-link">Open StorageBuddy</a>
            <span id="lastUpdate">Just now</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
