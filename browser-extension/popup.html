<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Tracker Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgb(20, 20, 30);
            color: #ffffff;
            padding: 10px;
            width: 320px;
            min-height: 400px;
        }

        .container {
            background: rgb(20, 20, 30);
            border-radius: 12px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .view-selector {
            background: rgb(45, 45, 55);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            color: rgb(255, 255, 255);
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            font-weight: 600;
        }

        .view-selector option {
            background: #2a2a3a;
            color: white;
        }

        .zoom-controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .zoom-controls label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }

        .zoom-button {
            background: rgb(102, 126, 234);
            border: none;
            border-radius: 4px;
            color: white;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .zoom-button:hover {
            background: rgb(118, 140, 250);
        }

        .zoom-value {
            font-size: 11px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .tip {
            background: rgba(102, 126, 234, 0.15);
            border-left: 3px solid rgb(102, 126, 234);
            padding: 8px 10px;
            margin: 8px 0;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.4;
        }

        .tip strong {
            color: rgb(168, 178, 255);
        }

        .content {
            padding: 10px;
            max-height: 450px;
            overflow-y: auto;
            background: rgb(20, 20, 30);
            color: #ffffff;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        .quest-group {
            margin-bottom: 15px;
            display: block !important;
            visibility: visible !important;
        }

        .quest-name {
            font-size: 13px;
            font-weight: 600;
            color: #a8b2ff !important;
            margin-bottom: 6px;
            padding: 4px 6px;
            background: rgba(102, 126, 234, 0.15) !important;
            border-radius: 4px;
            display: block !important;
            visibility: visible !important;
        }

        .item-list {
            margin-left: 8px;
            display: block !important;
            visibility: visible !important;
        }

        .item {
            display: flex !important;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            margin-bottom: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 12px;
            visibility: visible !important;
        }

        .item.completed {
            background: rgba(76, 175, 80, 0.2);
        }

        .item-name {
            flex: 1;
            color: #e0e0e0 !important;
            display: block !important;
            visibility: visible !important;
        }

        .item-progress {
            font-weight: 600;
            min-width: 50px;
            text-align: right;
            display: block !important;
            visibility: visible !important;
        }

        .item-progress.completed {
            color: #76ff76 !important;
        }

        .item-progress.incomplete {
            color: #ffaa66 !important;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        .error-state {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
            font-size: 12px;
        }

        .status-bar {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Quest Tracker</div>
            <select class="view-selector" id="viewSelector">
                <option value="completable">Ready</option>
                <option value="purchasable">Buyable</option>
                <option value="active">Active</option>
            </select>
        </div>

        <div class="zoom-controls">
            <label>Zoom:</label>
            <button class="zoom-button" id="zoomOut">-</button>
            <span class="zoom-value" id="zoomValue">100%</span>
            <button class="zoom-button" id="zoomIn">+</button>
        </div>

        <div class="content" id="content">
            <div class="tip">
                <strong>Tip:</strong> Pin this popup to keep it visible while you play. Use Alt+Tab to quickly switch between the game and quest tracker.
            </div>
            <div class="loading">Loading...</div>
        </div>

        <div class="status-bar">
            <span id="questCount">0 quests</span>
            <span id="lastUpdate">Just now</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
