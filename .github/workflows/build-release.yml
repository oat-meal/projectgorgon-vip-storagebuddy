name: Build Executable Releases

on:
  release:
    types: [created]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --name=QuestHelper-Windows --onefile --windowed --add-data="templates;templates" --add-data="quests.json;." --add-data="items.json;." --add-data="static;static" --hidden-import=flask --hidden-import=flask_cors --hidden-import=jinja2 --hidden-import=webview --collect-all=flask --collect-all=flask_cors --collect-all=webview launcher.py

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuestHelper-Windows
        path: dist/QuestHelper-Windows.exe

    - name: Upload executable to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/QuestHelper-Windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install system dependencies for pywebview
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1 || \
        sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0

    - name: Build executable
      run: |
        pyinstaller --name=QuestHelper-Linux --onefile --add-data="templates:templates" --add-data="quests.json:." --add-data="items.json:." --add-data="static:static" --hidden-import=flask --hidden-import=flask_cors --hidden-import=jinja2 --hidden-import=webview --collect-all=flask --collect-all=flask_cors --collect-all=webview launcher.py

    - name: Make executable executable
      run: |
        chmod +x dist/QuestHelper-Linux

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuestHelper-Linux
        path: dist/QuestHelper-Linux

    - name: Upload executable to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/QuestHelper-Linux
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
