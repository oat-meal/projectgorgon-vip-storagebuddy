<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ghibli-inspired treasure chest with soft, warm colors -->

  <!-- Chest shadow -->
  <ellipse cx="32" cy="58" rx="24" ry="4" fill="#5d4e37" opacity="0.3"/>

  <!-- Chest base (wooden body) -->
  <rect x="8" y="32" width="48" height="24" rx="3" fill="#8B5A2B"/>
  <rect x="10" y="34" width="44" height="20" rx="2" fill="#A0522D"/>

  <!-- Wood grain lines -->
  <line x1="12" y1="38" x2="52" y2="38" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
  <line x1="12" y1="44" x2="52" y2="44" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
  <line x1="12" y1="50" x2="52" y2="50" stroke="#8B4513" stroke-width="1" opacity="0.4"/>

  <!-- Chest lid (slightly open, showing golden glow) -->
  <path d="M8 32 Q8 20 32 16 Q56 20 56 32 L56 34 Q56 24 32 20 Q8 24 8 34 Z" fill="#6B4423"/>
  <path d="M10 31 Q10 22 32 18 Q54 22 54 31" fill="#8B5A2B" stroke="#6B4423" stroke-width="1"/>

  <!-- Golden glow from inside -->
  <path d="M14 32 Q14 26 32 23 Q50 26 50 32" fill="#FFD700" opacity="0.6"/>
  <path d="M18 32 Q18 28 32 25 Q46 28 46 32" fill="#FFEC8B" opacity="0.8"/>

  <!-- Sparkles coming from chest -->
  <circle cx="24" cy="28" r="2" fill="#FFF8DC" opacity="0.9"/>
  <circle cx="38" cy="26" r="1.5" fill="#FFF8DC" opacity="0.8"/>
  <circle cx="32" cy="24" r="2.5" fill="#FFFACD" opacity="0.9"/>
  <circle cx="42" cy="29" r="1" fill="#FFF8DC" opacity="0.7"/>
  <circle cx="20" cy="30" r="1" fill="#FFF8DC" opacity="0.7"/>

  <!-- Metal bands on chest -->
  <rect x="8" y="31" width="48" height="3" fill="#CD853F"/>
  <rect x="8" y="52" width="48" height="3" fill="#CD853F"/>

  <!-- Metal studs -->
  <circle cx="14" cy="32.5" r="1.5" fill="#DAA520"/>
  <circle cx="50" cy="32.5" r="1.5" fill="#DAA520"/>
  <circle cx="14" cy="53.5" r="1.5" fill="#DAA520"/>
  <circle cx="50" cy="53.5" r="1.5" fill="#DAA520"/>

  <!-- Lock/clasp -->
  <rect x="28" y="30" width="8" height="8" rx="1" fill="#DAA520"/>
  <rect x="29" y="31" width="6" height="6" rx="1" fill="#B8860B"/>
  <circle cx="32" cy="34" r="2" fill="#8B6914"/>
  <rect x="31" y="34" width="2" height="3" fill="#8B6914"/>
</svg>
